<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Otto Blog</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b12;
  color: #eaeaff;
  overflow-x: hidden;
}

/* 🌟 estrellas suaves */
.star {
  position: fixed;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.6;
  animation: twinkle 3s infinite;
}

@keyframes twinkle {
  0%,100% { opacity: 0.2; }
  50% { opacity: 1; }
}

/* contenedor */
.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
  margin-top: 30px;
  background: rgba(20,20,35,0.8);
  border-radius: 15px;
  border: 1px solid #3b4a6b;
}

/* Otto */
.otto {
  text-align: center;
}

.otto img {
  width: 180px;
  border-radius: 12px;
}

/* posts */
.post {
  background: rgba(255,255,255,0.05);
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}

/* botón */
button {
  background: #3b4a6b;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}

textarea {
  width: 100%;
  height: 80px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  padding: 8px;
  background: #1a1a2a;
  color: white;
}
</style>

</head>

<body>

<!-- OTTO -->
<div class="container">

<h1 style="text-align:center;">🐱 Otto Blog</h1>

<div class="otto">
  <img src="https://i.postimg.cc/sDzMjM7f/5dtiwm7jwi4d1.gif">
  <p>Otto observa tus pensamientos en silencio...</p>
</div>

<hr>

<!-- CREAR POST -->
<h3>✍ Nuevo post</h3>
<textarea id="postInput" placeholder="Escribe algo..."></textarea>
<button onclick="addPost()">Publicar</button>

<hr>

<!-- POSTS -->
<div id="posts"></div>

</div>

<script>
// cargar posts guardados
let posts = JSON.parse(localStorage.getItem("posts")) || [];

function renderPosts() {
  const container = document.getElementById("posts");
  container.innerHTML = "";

  posts.forEach(p => {
    const div = document.createElement("div");
    div.className = "post";
    div.innerHTML = "🌙 " + p;
    container.appendChild(div);
  });
}

function addPost() {
  const input = document.getElementById("postInput");
  if (input.value.trim() === "") return;

  posts.unshift(input.value);
  localStorage.setItem("posts", JSON.stringify(posts));

  input.value = "";
  renderPosts();
}

renderPosts();

/* 🌟 estrellas suaves */
for (let i = 0; i < 40; i++) {
  let star = document.createElement("div");
  star.className = "star";
  star.style.top = Math.random() * 100 + "vh";
  star.style.left = Math.random() * 100 + "vw";
  star.style.animationDuration = (2 + Math.random() * 3) + "s";
  document.body.appendChild(star);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Otto Blog</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b12;
  color: #eaeaff;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
  margin-top: 30px;
  background: rgba(20,20,35,0.85);
  border-radius: 15px;
  border: 1px solid #3b4a6b;
}

/* OTTO */
.otto {
  text-align: center;
}

.otto img {
  width: 160px;
  border-radius: 12px;
}

/* POST */
.post {
  background: rgba(255,255,255,0.05);
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  position: relative;
}

.delete {
  position: absolute;
  right: 10px;
  top: 10px;
  background: red;
  border: none;
  color: white;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
}

/* INPUTS */
input, textarea, select {
  width: 100%;
  margin-top: 5px;
  padding: 8px;
  border-radius: 8px;
  border: none;
  background: #1a1a2a;
  color: white;
}

button {
  margin-top: 8px;
  background: #3b4a6b;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* IMAGEN */
.post img {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}

/* categoría */
.cat {
  font-size: 12px;
  opacity: 0.7;
}

/* filtro botones */
.filter-bar {
  margin-top: 15px;
  text-align: center;
}

/* estrellas suaves */
.star {
  position: fixed;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.5;
}
</style>

</head>

<body>

<div class="container">

<h1 style="text-align:center;">🐱 Otto Blog</h1>

<!-- OTTO -->
<div class="otto">
  <img
